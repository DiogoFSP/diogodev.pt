<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="400" viewBox="0 0 1200 400">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A0A0B"/>
      <stop offset="50%" stop-color="#121215"/>
      <stop offset="100%" stop-color="#0E0E11"/>
    </linearGradient>

    <!-- Amber Radial Glow on Right -->
    <radialGradient id="amberGlow" cx="85%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#FFB454" stop-opacity="0.25"/>
      <stop offset="40%" stop-color="#FFB454" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#FFB454" stop-opacity="0"/>
    </radialGradient>

    <!-- Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#222228" stroke-width="1" stroke-opacity="0.5"/>
    </pattern>
  </defs>

  <!-- Base background -->
  <rect width="1200" height="400" fill="url(#bgGrad)"/>
  <rect width="1200" height="400" fill="url(#grid)"/>
  <rect width="1200" height="400" fill="url(#amberGlow)"/>

  <!-- Decorative technical line on the right side -->
  <line x1="480" y1="310" x2="1120" y2="310" stroke="#2D2D35" stroke-width="1"/>
  <circle cx="480" cy="310" r="3" fill="#FFB454"/>
  <circle cx="1120" cy="310" r="3" fill="#FFB454"/>

  <!-- Technical Monospace Tag in English: Computer Engineering -->
  <text x="480" y="130" font-family="monospace, sans-serif" font-size="13" fill="#888894" letter-spacing="3">COMPUTER ENGINEERING &amp; APPLIED AI</text>

  <!-- Title: diogodev.pt -->
  <text x="480" y="200" font-family="sans-serif" font-size="52" font-weight="300" fill="#F5F5F7" letter-spacing="-1">
    diogodev<tspan fill="#FFB454">.pt</tspan>
  </text>

  <!-- Subtitle in English: Computer Engineering @ ISEC -->
  <text x="480" y="248" font-family="sans-serif" font-size="19" font-weight="400" fill="#A0A0AA">
    Diogo Pinto · Computer Engineering @ ISEC
  </text>

  <!-- Decorative geometric accents on right -->
  <rect x="1080" y="110" width="40" height="40" rx="8" fill="none" stroke="#FFB454" stroke-opacity="0.25" stroke-width="1.5"/>
  <circle cx="1100" cy="130" r="3" fill="#FFB454"/>
</svg>
